---
networks:
  net:

services:
  redis:
    image: redis:7.4-alpine
    networks: [net]
    restart: always
    command:
      - 'redis-server'
      - '--requirepass ${REDIS_PASSWORD}'
      - '--save 900 1'
      - '--save 300 10'
      - '--save 60 100'
    volumes:
      - /mnt/docker/redis/data:/data

  frigate-telegram:
    build:
      context: .
      dockerfile: docker/amd64/Dockerfile
    restart: always
    networks: [net]
    ports: 
      - 3232:3232
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FRIGATE_URL: ${FRIGATE_URL}
      FRIGATE_EVENT_LIMIT: 5
      DEBUG: False
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SLEEP_TIME: 30
      FRIGATE_EXTERNAL_URL: ${FRIGATE_EXTERNAL_URL}
      TZ: ${TZ}
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REST_API_ENABLE: False
      REST_API_LISTEN_ADDR: ${REST_API_LISTEN_ADDR}
      TIME_WAIT_SAVE: ${TIME_WAIT_SAVE}
      INCLUDE_CLIP_EVENT: ${INCLUDE_CLIP_EVENT}
      INCLUDE_PREVIEW_EVENT: ${INCLUDE_PREVIEW_EVENT}
    volumes:
      - type: tmpfs # Optional
        target: /tmp
        tmpfs:
          size: 500000000